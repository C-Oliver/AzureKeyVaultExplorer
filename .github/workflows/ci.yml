name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: write

env:
  DOTNET_VERSION: '10.0.x'
  SOLUTION: 'AzureKeyVaultExplorer.sln'
  CONFIGURATION: 'Release'

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Restore dependencies
      run: dotnet restore ${{ env.SOLUTION }}

    - name: Build
      run: dotnet build ${{ env.SOLUTION }} --configuration ${{ env.CONFIGURATION }} --no-restore

    - name: Run Unit Tests with Coverage
      run: |
        dotnet test Vault/Tests/VaultExplorer.Tests.csproj `
          --configuration ${{ env.CONFIGURATION }} `
          --no-build `
          --verbosity normal `
          --collect:"XPlat Code Coverage" `
          --results-directory ./TestResults `
          --logger "trx;LogFileName=unit-tests.trx"

    - name: Generate Coverage Report
      uses: danielpalme/ReportGenerator-GitHub-Action@5
      with:
        reports: '**/TestResults/**/coverage.cobertura.xml'
        targetdir: 'CoverageReport'
        reporttypes: 'HtmlInline_AzurePipelines;Cobertura;MarkdownSummaryGithub'

    - name: Upload Test Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: |
          TestResults/**/*.trx
        retention-days: 30

    - name: Upload Code Coverage Report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: code-coverage
        path: CoverageReport/
        retention-days: 30

    - name: Add Coverage Summary to PR
      uses: marocchino/sticky-pull-request-comment@v2
      if: github.event_name == 'pull_request'
      with:
        path: CoverageReport/SummaryGithub.md

  publish:
    runs-on: windows-latest
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Configure appsettings for release
      shell: pwsh
      run: |
        $config = Get-Content Vault/Explorer/appsettings.json | ConvertFrom-Json
        $config.Telemetry.Enabled = $true
        if ('${{ secrets.APPINSIGHTS_CONNECTION_STRING }}') {
          $config.Telemetry.ConnectionString = '${{ secrets.APPINSIGHTS_CONNECTION_STRING }}'
        }
        $config | ConvertTo-Json -Depth 5 | Set-Content Vault/Explorer/appsettings.json

    - name: Publish Release (self-contained)
      run: |
        dotnet publish Vault/Explorer/VaultExplorer.csproj `
          --configuration Release `
          --runtime win-x64 `
          --self-contained true `
          -p:PublishSingleFile=true `
          --output ./publish/self-contained

    - name: Publish Release (framework-dependent)
      run: |
        dotnet publish Vault/Explorer/VaultExplorer.csproj `
          --configuration Release `
          --runtime win-x64 `
          --self-contained false `
          -p:PublishSingleFile=true `
          --output ./publish/framework-dependent

    - name: Upload Self-Contained Build
      uses: actions/upload-artifact@v4
      with:
        name: VaultExplorer-win-x64-self-contained
        path: publish/self-contained/
        retention-days: 90

    - name: Upload Framework-Dependent Build
      uses: actions/upload-artifact@v4
      with:
        name: VaultExplorer-win-x64
        path: publish/framework-dependent/
        retention-days: 90

    - name: Create zip archives for release
      shell: pwsh
      run: |
        Compress-Archive -Path ./publish/self-contained/* -DestinationPath ./VaultExplorer-win-x64-self-contained.zip
        Compress-Archive -Path ./publish/framework-dependent/* -DestinationPath ./VaultExplorer-win-x64.zip

    - name: Get version
      id: version
      shell: pwsh
      run: |
        $v = Select-String '<Version>(.*)</Version>' Directory.Build.props | ForEach-Object { $_.Matches[0].Groups[1].Value }
        echo "VERSION=$v" >> $env:GITHUB_OUTPUT

    - name: Extract changelog for current version
      id: changelog
      shell: pwsh
      run: |
        $content = Get-Content CHANGELOG.md -Raw
        # Extract the section for the current version (between ## [x.y.z] and the next ## [)
        if ($content -match '(?s)(## \[${{ steps.version.outputs.VERSION }}\].*?)(?=\n## \[|$)') {
          $notes = $Matches[1]
        } else {
          $notes = "See [CHANGELOG.md](CHANGELOG.md) for details."
        }
        # Write to file to avoid multiline env var issues
        $notes | Set-Content release-notes.md

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ steps.version.outputs.VERSION }}
        name: v${{ steps.version.outputs.VERSION }}
        body_path: release-notes.md
        files: |
          VaultExplorer-win-x64-self-contained.zip
          VaultExplorer-win-x64.zip
        draft: false
        prerelease: false
